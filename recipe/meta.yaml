{% set version = "2.17" %}

package:
  name: pyxel-sim
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/p/pyxel-sim/pyxel_sim-{{ version }}.tar.gz
  sha256: 34dc5dc2c39f8d616ad1ccf66e7f96a4bd4ae7347b42093febdbc4a5c1b17d22

build:
  entry_points:
    - pyxel = pyxel.run:main
    - pyxel-sim = pyxel.run:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.10
    - setuptools >=77
    - versioneer ==0.29
    - wheel
    - pip
  run:
    - python >=3.10
    - numpy >=2
    - scipy >=1.12
    - pandas >=2.1,<3
    - xarray >=2024.10.0
    - astropy >=5.2
    - astroquery <0.4.11
    - specutils >=1.2
    - synphot
#    - pyckles
    - scikit-image >=0.23.0
    - numba >=0.56.4
    - hvplot >=0.9
    - matplotlib-base
    - seaborn
    - fsspec >=2021
    - h5py
    - pympler
    - pillow
    - diskcache
    - rich
    - annotated-types
    - asdf # Added manually
    - pygmo  >=2.16.1 # Added manually
    - poppy # Added manually
    - panel # Added manually
    - dask  # Added manually
    - pooch # Added manually

test:
  imports:
    - pyxel
    - pyxel.calibration
  commands:
#    - pip check
    - pyxel --help
    - pyxel-sim --help
  requires:
    - pip

about:
  home: https://esa.gitlab.io/pyxel/
  summary: Pyxel detector simulation framework.
  dev_url: https://gitlab.com/esa/pyxel
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - flemmel
